<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiLearn - Ace Your UTME</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #002060;
            --primary-teal: #008080;
            --bg-light: #F8F9FF;
            --text-dark: #002060;
            --text-gray: #666666;
            --border-color: #E0E0E0;
            --input-bg: #F8F9FF;
            --link-blue: #2F55D4;
            --transition-speed: 0.6s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #F0F4FF 0%, #FFFFFF 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: 40px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            text-align: center;
        }

        /* Logo Section */
        .logo-section {
            margin-bottom: 30px;
        }

        .logo-image {
            width: 120px;
            height: auto;
            margin: 0 auto 105px;
            display: block;
        }

        /* Hero Text */
        .hero-text {
            margin-bottom: 40px;
        }

        .hero-text h1 {
            font-size: 36px;
            color: var(--text-dark);
            line-height: 1.1;
            font-weight: 700;
        }

        .hero-text h1 span {
            color: var(--primary-teal);
        }

        .hero-text p {
            color: var(--text-gray);
            font-size: 16px;
            margin-top: 10px;
            line-height: 1.5;
            font-weight: 400;
        }

        /* Login Card & Sliding Logic */
        .login-card {
            background: white;
            border-radius: 40px;
            padding: 40px 0; /* Vertical padding only, horizontal handled by containers */
            box-shadow: 0 25px 60px rgba(0, 32, 96, 0.08);
            margin-bottom: 40px;
            border: 1px solid #F0F0F0;
            overflow: hidden; /* CRITICAL: Clips the sliding content */
            position: relative;
        }

        /* Hidden Checkbox for State Management */
        #auth-toggle {
            display: none;
        }

        /* Tab Navigation */
        .tabs {
            display: flex;
            margin: 0 30px 30px;
            position: relative;
            border-bottom: 1px solid #F0F0F0;
        }

        .tab {
            flex: 1;
            padding-bottom: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            color: #999;
            text-align: center;
            transition: color 0.3s ease;
            z-index: 2;
        }

        /* Animated Tab Underline */
        .tab-underline {
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 50%;
            height: 3px;
            background: var(--primary-blue);
            transition: transform var(--transition-speed) cubic-bezier(0.645, 0.045, 0.355, 1);
            border-radius: 3px;
        }

        #auth-toggle:checked ~ .tabs .tab-underline {
            transform: translateX(100%);
        }

        #auth-toggle:not(:checked) ~ .tabs .tab-login,
        #auth-toggle:checked ~ .tabs .tab-signup {
            color: var(--primary-blue);
        }

        /* Sliding Wrapper */
        .forms-wrapper {
            display: flex;
            width: 200%; /* Two forms side by side */
            transition: transform var(--transition-speed) cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        #auth-toggle:checked ~ .forms-wrapper {
            transform: translateX(-50%);
        }

        .form-container {
            width: 50%;
            padding: 0 30px; /* Internal padding for each form */
            transition: opacity var(--transition-speed) ease, transform var(--transition-speed) ease;
        }

        /* Fade effect for inactive form */
        #auth-toggle:not(:checked) ~ .forms-wrapper .signup-container,
        #auth-toggle:checked ~ .forms-wrapper .login-container {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
        }

        #auth-toggle:checked ~ .forms-wrapper .signup-container,
        #auth-toggle:not(:checked) ~ .forms-wrapper .login-container {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        .form-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            transition: color 0.3s;
        }

        .form-group .eye-icon {
            left: auto;
            right: 15px;
            cursor: pointer;
        }

        .form-control {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            background-color: var(--input-bg);
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .form-control:focus {
            border-color: var(--primary-teal);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(0, 128, 128, 0.05);
        }

        .form-control:focus + i {
            color: var(--primary-teal);
        }

        .forgot-password {
            display: block;
            text-align: right;
            color: var(--link-blue);
            font-size: 13px;
            text-decoration: none;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .btn-action {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #008080, #002060);
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(0, 32, 96, 0.15);
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(0, 32, 96, 0.2);
            filter: brightness(1.1);
        }

        .separator {
            display: flex;
            align-items: center;
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .separator::before, .separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #EEE;
        }

        .separator:not(:empty)::before { margin-right: 15px; }
        .separator:not(:empty)::after { margin-left: 15px; }

        .btn-social {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            background: white;
            color: #333;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.2s;
        }

        .btn-social:hover { 
            background-color: #F8F9FF;
            border-color: #D0D0D0;
        }
        .btn-social img { width: 20px; height: 20px; }

        .switch-text {
            font-size: 14px;
            color: var(--text-gray);
            margin-top: 20px;
            font-weight: 400;
        }

        .switch-text label {
            color: var(--link-blue);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .switch-text label:hover { text-decoration: underline; }

        /* Features Section */
        .features {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 60px;
        }

        .feature-item { text-align: center; }
        .feature-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 10px;
            font-size: 20px;
            transition: transform 0.3s;
        }

        .feature-item:hover .feature-icon {
            transform: scale(1.1);
        }

        .feature-item:nth-child(1) .feature-icon { background-color: #F3E5F5; color: #7B1FA2; }
        .feature-item:nth-child(2) .feature-icon { background-color: #E0F2F1; color: #00796B; }
        .feature-item:nth-child(3) .feature-icon { background-color: #FFF3E0; color: #E65100; }
        .feature-item:nth-child(4) .feature-icon { background-color: #E3F2FD; color: #1976D2; }

        .feature-item p {
            font-size: 11px;
            font-weight: 600;
            color: #333;
            line-height: 1.2;
        }

        /* Footer Wave */
        .footer-wave {
            position: relative;
            width: 100%;
            height: 180px;
            background: linear-gradient(to right, #2E1A8E, #002060, #008080);
            clip-path: ellipse(120% 100% at 50% 100%);
            margin-top: 40px;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding-bottom: 30px;
        }

        .footer-icon { color: rgba(255, 255, 255, 0.3); font-size: 24px; }
        .footer-math { color: rgba(255, 255, 255, 0.3); font-size: 18px; font-weight: 500; }

        @media (max-width: 480px) {
            .features { grid-template-columns: repeat(2, 1fr); gap: 20px; }
            .hero-text h1 { font-size: 28px; }
            .login-card { border-radius: 30px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-section">
            <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663584504305/jlXamgVcAIcxXRwJ.jpg" alt="OptiLearn Logo" class="logo-image">
        </div>

        <div class="hero-text">
            <h1>Ace Your UTME.<br><span>Achieve</span> Your Dream.</h1>
            <p>Smart practice, real progress,<br>better results.</p>
        </div>

        <div class="login-card">
            <!-- Checkbox for state management -->
            <input type="checkbox" id="auth-toggle">

            <!-- Tabs -->
            <div class="tabs">
                <label for="auth-toggle" class="tab tab-login">Log In</label>
                <label for="auth-toggle" class="tab tab-signup">Sign up</label>
                <div class="tab-underline"></div>
            </div>

            <!-- Sliding Wrapper -->
            <div class="forms-wrapper">
                <!-- Login Form -->
                <div class="form-container login-container">
                    <form>
                        <div class="form-group">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" class="form-control" id="login-email" placeholder="Email or Phone">
                        </div>
                        <div class="form-group">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="login-password" class="form-control" placeholder="Password">
                            <i class="fa-regular fa-eye eye-icon"></i>
                        </div>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                        <button type="submit" class="btn-action" id="login-btn">
                            Log In <i class="fa-solid fa-arrow-right"></i>
                        </button>
                        <div class="separator">or</div>
                        <button type="button" class="btn-social">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                            Continue with Google
                        </button>
                        <p class="switch-text">
                            Don't have an account? <label for="auth-toggle">Sign up</label>
                        </p>
                    </form>
                </div>

                <!-- Sign Up Form -->
                <div class="form-container signup-container">
                    <form>
                        <div class="form-group">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" class="form-control" id="signup-name" placeholder="Full Name">
                        </div>
                        <div class="form-group">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" class="form-control" id="signup-email" placeholder="Email Address">
                        </div>
                        <div class="form-group">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" class="form-control" id="signup-password" placeholder="Create Password">
                            <i class="fa-regular fa-eye eye-icon"></i>
                        </div>
                        <button type="submit" id="signup-btn" class="btn-action">
                            Create Account <i class="fa-solid fa-user-plus"></i>
                        </button>
                        <div class="separator">or</div>
                        <button type="button" class="btn-social">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                            Sign up with Google
                        </button>
                        <p class="switch-text">
                            Already have an account? <label for="auth-toggle">Log In</label>
                        </p>
                    </form>
                </div>
            </div>
        </div>

        <div class="features">
            <div class="feature-item">
                <div class="feature-icon"><i class="fa-solid fa-bullseye"></i></div>
                <p>Topic-Based<br>Practice</p>
            </div>
            <div class="feature-item">
                <div class="feature-icon"><i class="fa-solid fa-chart-line"></i></div>
                <p>Track Your<br>Progress</p>
            </div>
            <div class="feature-item">
                <div class="feature-icon"><i class="fa-solid fa-trophy"></i></div>
                <p>Improve<br>Everyday</p>
            </div>
            <div class="feature-item">
                <div class="feature-icon"><i class="fa-solid fa-shield-halved"></i></div>
                <p>Exam Ready<br>Confidence</p>
            </div>
        </div>
    </div>

    <div class="footer-wave">
        <i class="fa-solid fa-book-open footer-icon"></i>
        <span class="footer-math">E=mc<sup>2</sup></span>
        <i class="fa-solid fa-flask footer-icon"></i>
        <i class="fa-solid fa-graduation-cap footer-icon"></i>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl =  'https://jxdllmwdyvhcsdvodnbb.supabase.co/rest/v1/';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4ZGxsbXdkeXZoY3Nkdm9kbmJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMDg2OTgsImV4cCI6MjA5Mjg4NDY5OH0.KlkSqiB_KRT6aQdN-olzIo6sYLZQ0ECA9KBoUs6F44g';
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

document.getElementById("signup-btn").addEventListener("click", async (e) => {
    e.preventDefault();
        //Sign-up
    const name = document.getElementById("signup-name").value;
    const email = document.getElementById("signup-email").value;
    const password = document.getElementById("signup-password").value;

    const { data, error } = await supabase.auth.signUp({
        email: email,
        password: password,
        options: {
            data: {
                full_name: name
            }
        }
    });

    if(error){
        alert(error.message);
    } else {
        alert("Account created! Check your email.");
    }
});

//Log-in

document.getElementById("login-btn").addEventListener("click", async (e) => {
    e.preventDefault();

    const email = document.getElementById("login-email").value;
    const password = document.getElementById("login-password").value;

    const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
    });

    if(error){
        alert(error.message);
    } else {
        alert("Login successful!");

        window.location.href = "index.html";
    }
});

const { data } = await supabase.auth.getSession();

if(data.session){
   window.location.href = "index.html";

</script>
</body>
</html>
