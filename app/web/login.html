<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiLearn - Ace Your UTME</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #002060;
            --primary-teal: #008080;
            --bg-light: #F8F9FF;
            --text-dark: #002060;
            --text-gray: #666666;
            --border-color: #E0E0E0;
            --input-bg: #F8F9FF;
            --link-blue: #2F55D4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #F0F4FF 0%, #FFFFFF 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: 40px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            text-align: center;
        }

        /* Logo Section */
        .logo-section {
            margin-bottom: 30px;
        }

        .logo-image {
            width: 120px;
            height: auto;
            margin: 0 auto 105px;
            display: block;
        }

        .logo-text {
            font-size: 48px;
            font-weight: 700;
            display: flex;
            justify-content: center;
            align-items: center;
            letter-spacing: -0.5px;
        }

        .logo-text span:first-child {
            color: var(--primary-teal);
        }

        .logo-text span:last-child {
            color: var(--primary-blue);
        }

        .dot-separator {
            width: 12px;
            height: 12px;
            background-color: #FF9500;
            border-radius: 50%;
            margin: 0 8px;
            display: inline-block;
            vertical-align: middle;
        }

        .tagline {
            color: var(--text-gray);
            font-size: 14px;
            margin-top: 8px;
            font-weight: 400;
        }

        /* Hero Text */
        .hero-text {
            margin-bottom: 40px;
        }

        .hero-text h1 {
            font-size: 36px;
            color: var(--text-dark);
            line-height: 1.1;
            font-weight: 700;
        }

        .hero-text h1 span {
            color: var(--primary-teal);
        }

        .hero-text p {
            color: var(--text-gray);
            font-size: 16px;
            margin-top: 10px;
            line-height: 1.5;
            font-weight: 400;
        }

        /* Login Card */
        .login-card {
            background: white;
            border-radius: 40px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.03);
            margin-bottom: 40px;
            border: 1px solid #F0F0F0;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #F0F0F0;
            margin-bottom: 30px;
        }

        .tab {
            flex: 1;
            padding-bottom: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            color: #999;
            text-align: center;
            transition: color 0.3s;
        }

        .tab.active {
            color: var(--primary-blue);
            border-bottom: 3px solid var(--primary-blue);
        }

        .form-group {
            position: relative;
            margin-bottom: 20px;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .form-group .eye-icon {
            left: auto;
            right: 15px;
            cursor: pointer;
        }

        .form-control {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background-color: var(--input-bg);
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .form-control::placeholder {
            color: #999;
        }

        .form-control:focus {
            border-color: var(--primary-teal);
        }

        .forgot-password {
            display: block;
            text-align: right;
            color: var(--link-blue);
            font-size: 13px;
            text-decoration: none;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(to right, #008080, #002060);
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            font-family: 'Poppins', sans-serif;
            transition: transform 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
        }

        .separator {
            display: flex;
            align-items: center;
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .separator::before, .separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #EEE;
        }

        .separator:not(:empty)::before {
            margin-right: 15px;
        }

        .separator:not(:empty)::after {
            margin-left: 15px;
        }

        .btn-social {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: white;
            color: #333;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-family: 'Poppins', sans-serif;
            transition: background-color 0.2s;
        }

        .btn-social:hover {
            background-color: #F8F9FF;
        }

        .btn-social img {
            width: 20px;
            height: 20px;
        }

        .signup-text {
            font-size: 14px;
            color: var(--text-gray);
            margin-top: 20px;
            font-weight: 400;
        }

        .signup-text a {
            color: var(--link-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .signup-text a:hover {
            text-decoration: underline;
        }

        /* Features Section */
        .features {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 60px;
        }

        .feature-item {
            text-align: center;
        }

        .feature-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 10px;
            font-size: 20px;
        }

        .feature-item:nth-child(1) .feature-icon { 
            background-color: #F3E5F5; 
            color: #7B1FA2; 
        }

        .feature-item:nth-child(2) .feature-icon { 
            background-color: #E0F2F1; 
            color: #00796B; 
        }

        .feature-item:nth-child(3) .feature-icon { 
            background-color: #FFF3E0; 
            color: #E65100; 
        }

        .feature-item:nth-child(4) .feature-icon { 
            background-color: #E3F2FD; 
            color: #1976D2; 
        }

        .feature-item p {
            font-size: 11px;
            font-weight: 600;
            color: #333;
            line-height: 1.2;
        }

        /* Footer Wave */
        .footer-wave {
            position: relative;
            width: 100%;
            height: 180px;
            background: linear-gradient(to right, #2E1A8E, #002060, #008080);
            clip-path: ellipse(120% 100% at 50% 100%);
            margin-top: 40px;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding-bottom: 30px;
        }

        .footer-icon {
            color: rgba(255, 255, 255, 0.3);
            font-size: 24px;
        }

        .footer-math {
            color: rgba(255, 255, 255, 0.3);
            font-size: 18px;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .features {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }

            .hero-text h1 {
                font-size: 28px;
            }

            .logo-text {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo Section -->
        <div class="logo-section">
            <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663584504305/jlXamgVcAIcxXRwJ.jpg" alt="OptiLearn Logo" class="logo-image">
        </div>

        <!-- Hero Text -->
        <div class="hero-text">
            <h1>Ace Your UTME.<br><span>Achieve</span> Your Dream.</h1>
            <p>Smart practice, real progress,<br>better results.</p>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <div class="tabs">
                <div class="tab active">Log In</div>
                <div class="tab">Sign Up</div>
            </div>

            <form>
                <div class="form-group">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="text" class="form-control" placeholder="Email or Phone Number">
                </div>
                <div class="form-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" class="form-control" placeholder="Password">
                    <i class="fa-regular fa-eye eye-icon"></i>
                </div>

                <a href="#" class="forgot-password">Forgot Password?</a>

                <button type="submit" class="btn-login">
                    Log In <i class="fa-solid fa-arrow-right"></i>
                </button>

                <div class="separator">or</div>

                <button type="button" class="btn-social">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                    Continue with Google
                </button>

                <button type="button" class="btn-social">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_2023.png" alt="Facebook">
                    Continue with Facebook
                </button>

                <p class="signup-text">
                    Don't have an account? <a href="#">Sign up</a>
                </p>
            </form>
        </div>

        <!-- Features Section -->
        <div class="features">
            <div class="feature-item">
                <div class="feature-icon"><i class="fa-solid fa-bullseye"></i></div>
                <p>Topic-Based<br>Practice</p>
            </div>
            <div class="feature-item">
                <div class="feature-icon"><i class="fa-solid fa-chart-line"></i></div>
                <p>Track Your<br>Progress</p>
            </div>
            <div class="feature-item">
                <div class="feature-icon"><i class="fa-solid fa-trophy"></i></div>
                <p>Improve<br>Everyday</p>
            </div>
            <div class="feature-item">
                <div class="feature-icon"><i class="fa-solid fa-shield-halved"></i></div>
                <p>Exam Ready<br>Confidence</p>
            </div>
        </div>
    </div>

    <!-- Footer Wave -->
    <div class="footer-wave">
        <i class="fa-solid fa-book-open footer-icon"></i>
        <span class="footer-math">E=mc<sup>2</sup></span>
        <i class="fa-solid fa-flask footer-icon"></i>
        <i class="fa-solid fa-graduation-cap footer-icon"></i>
    </div>

</body>
</html>
